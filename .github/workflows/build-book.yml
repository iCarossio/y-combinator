name: Build book

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - "assets/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-book.yml"
  pull_request:
    paths:
      - "book/**"
      - "assets/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      # Chromium (used by pagedjs-cli via Puppeteer) needs these on Ubuntu.
      - name: Install Chromium system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libasound2t64 libpango-1.0-0 libcairo2 fonts-liberation

      - name: Build PDF
        run: node book/build.mjs

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: How-to-Get-Into-Y-Combinator
          path: dist/How-to-Get-Into-Y-Combinator.pdf

      # On pushes to main, commit the freshly built PDF back into the repo so the
      # download link is always current. Guarded against retrigger loops.
      - name: Commit rebuilt PDF
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/How-to-Get-Into-Y-Combinator.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes."
          else
            git commit -m "build: regenerate book PDF [skip ci]"
            git push
          fi
